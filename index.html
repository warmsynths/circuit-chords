<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chord Mapper</title>
    <style>
      :root {
        --bg-1: #0b0f14;
        --bg-2: #121922;
        --surface: #1b2431d9;
        --text: #e4edf8;
        --muted: #98a7bd;
        --accent: #2dd4bf;
        --accent-2: #f59e0b;
        --border: #2d3a4d;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        width: 100%;
      }

      body {
        font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        color: var(--text);
        overflow-x: hidden;
        background:
          radial-gradient(1200px 500px at 10% -20%, #22d3ee33, transparent 65%),
          radial-gradient(900px 400px at 90% -10%, #f59e0b22, transparent 65%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2));
      }

      main {
        width: 100%;
        margin: 0;
        padding: 0 clamp(0.75rem, 2.6vw, 1.25rem);
      }

      .panel {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 0;
        padding: 1.25rem;
        backdrop-filter: blur(6px);
        box-shadow:
          inset 0 1px 0 rgb(255 255 255 / 0.03),
          0 14px 38px rgb(2 6 23 / 0.55);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(1.35rem, 2.2vw, 2rem);
      }

      p {
        margin: 0;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <chord-mapper-app></chord-mapper-app>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
