<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Circuit Chord Forge - Novation Circuit Tracks Chord Mapper</title>
    <!-- Google Fonts: Space Grotesk (Retro-modern geometric) & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --bg-1: #100e0d; /* Deep warm charcoal-brown */
        --bg-2: #181513; 
        --surface: rgba(28, 24, 22, 0.82); /* Warm cardboard-slate card */
        --text: #f4efe6; /* Soft vintage cream text */
        --muted: #8b8070; /* Warm organic sepia-grey */
        --accent: #f26a36; /* Warm 70s rotoscope orange-red (active / root) */
        --accent-glow: rgba(242, 106, 54, 0.28);
        --accent-hover: #ff7f4d;
        --accent-2: #e5ad35; /* Vintage mustard yellow (chord tones / lit) */
        --accent-2-glow: rgba(229, 173, 53, 0.22);
        --accent-3: #8fa87a; /* Sage/olive green */
        --border: rgba(139, 128, 112, 0.22); /* Soft paper-like border */
        --border-active: rgba(242, 106, 54, 0.35);
        --pad-dim: linear-gradient(180deg, #26211e, #1a1614);
        --pad-lit: linear-gradient(180deg, #e5ad35, #ba881b);
        --pad-active: linear-gradient(180deg, #f26a36, #c24616);
        --pad-target: #f4efe6; /* Cream outline for press voicing targets */
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        width: 100%;
      }

      body {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: var(--text);
        overflow-x: hidden;
        background:
          radial-gradient(1200px 500px at 15% -20%, rgba(242, 106, 54, 0.12), transparent 60%),
          radial-gradient(900px 400px at 85% -10%, rgba(229, 173, 53, 0.08), transparent 60%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2));
        background-attachment: fixed;
      }

      /* Rotoscope old film grain effect */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0.055;
        pointer-events: none;
        z-index: 9999;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      main {
        width: 100%;
        margin: 0;
        padding: 0 clamp(0.75rem, 2.6vw, 1.25rem);
      }

      /* Premium Header Styles */
      .app-header {
        max-width: 1400px;
        margin: 2.5rem auto 0.5rem;
        padding: 0 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }

      @media (max-width: 1024px) {
        .app-header {
          display: none;
        }
      }

      .logo-area {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        position: relative;
      }

      .logo-icon {
        width: 28px;
        height: 28px;
        color: var(--accent);
        filter: drop-shadow(0 0 6px var(--accent-glow));
      }

      .brand {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.55rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        display: flex;
        gap: 0.45rem;
      }

      .brand-forge {
        color: var(--text);
      }

      .brand-chords {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .app-subtitle {
        font-size: 0.86rem;
        color: var(--muted);
        margin: 0;
        font-weight: 500;
        letter-spacing: 0.01em;
      }

      /* Footer */
      .app-footer {
        max-width: 1400px;
        margin: 4rem auto 2rem;
        padding: 1.5rem;
        border-top: 1px solid var(--border);
        text-align: center;
        font-size: 0.8rem;
        color: var(--muted);
      }

      .app-footer a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 700;
        transition: color 150ms ease;
      }

      .app-footer a:hover {
        color: var(--text);
        text-decoration: underline;
      }
    </style>
    <script type="module" crossorigin src="/circuit-chords/assets/index-8GXjBi_b.js"></script>
  </head>
  <body>
    <header class="app-header">
      <div class="logo-area">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"></path>
          <circle cx="6" cy="18" r="3"></circle>
          <circle cx="18" cy="16" r="3"></circle>
        </svg>
        <h1 class="brand">
          <span class="brand-forge">Circuit</span>
          <span class="brand-chords">Chord Forge</span>
        </h1>
      </div>
      <p class="app-subtitle">Interactive chord mapping and pad guidance for the Novation Circuit Tracks note view</p>
    </header>

    <main>
      <chord-mapper-app></chord-mapper-app>
    </main>

    <footer class="app-footer">
      <p>Created by <a href="https://github.com/warmsynths" target="_blank" rel="noopener">Warm Synths</a>. Open source chord visualization utility.</p>
    </footer>

  </body>
</html>
